<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO.FOLIO - 极速稳定画廊</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRO.FOLIO">
    <link rel="apple-touch-icon" href="https://img.icons8.com/?size=512&id=118557&format=png">
    
    <meta name="mobile-web-app-capable" content="yes">

    <script type="importmap">
    {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .invisible-scroll-box { 
            max-height: 85vh;
            overflow-y: auto !important; 
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch; 
        }
        .invisible-scroll-box::-webkit-scrollbar { display: none; }
        .transition-all-fast { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 自定义美化滚动条 (针对长图展示区域) */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 4px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #a1a1aa; }

        /* 极致宽屏适配 */
        .max-w-gallery { max-width: 1900px; margin-left: auto; margin-right: auto; }
        /* 经典圆角 */
        .rounded-big { border-radius: 1.5rem; }
        
        /* 💡 手机端轻量级双列瀑布流 (调整为类似淘宝的紧凑间距 8px) */
        .gallery-columns {
            column-gap: 0.5rem;
            column-count: 2;
        }
        @media (min-width: 768px) { .gallery-columns { column-count: 3; column-gap: 1.5rem; } }
        @media (min-width: 1024px) { .gallery-columns { column-count: 4; } }
        @media (min-width: 1280px) { .gallery-columns { column-count: 5; } }
        
        .break-inside-avoid {
            break-inside: avoid;
            -webkit-column-break-inside: avoid;
        }
        
        body {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-white selection:bg-zinc-900 selection:text-white text-zinc-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import ReactDOM from 'react-dom/client';

        // ========================================================
        // 💡 离线预载本地备用演示数据 (防止新库空空如也)
        // ========================================================
        const LOCAL_FALLBACK_CATEGORIES = [
            { id: 'All', label: '全部', order: 0 },
            { id: 'c_1', label: '3D作品', order: 1 },
            { id: 'c_2', label: '动态视频', order: 2 },
            { id: 'c_3', label: '创意长图', order: 3 }
        ];
        const LOCAL_FALLBACK_CONFIG = {
            header: {
                title: 'MY CREATIVE WORK',
                subtitle: 'PRO.PORTFOLIO',
                headerImage: ''
            },
            watermark: '© COPY PROTECTION',
            borderRadius: 16,
            titleColor: '#18181b',
            textColor: '#71717a'
        };
        const LOCAL_FALLBACK_PROJECTS = [
            {
                id: 'local_p1',
                title: '品牌动态视觉提案',
                description: '这是一个精美的品牌动态视觉设计提案。视频已托管于国内高速腾讯云COS，首帧画面无缝缓冲播放。支持全屏及音量控制。',
                type: '动态视频',
                year: 2026,
                month: 6,
                videoUrl: 'https://my-portfolio-video-1250000000.cos.ap-shanghai.myqcloud.com/01-brand-motion.mp4', 
                coverImage: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="%23f4f4f5"/><text x="50%25" y="50%25" font-family="sans-serif" font-weight="bold" font-size="24" fill="%23a1a1aa" text-anchor="middle" dominant-baseline="middle">视频作品正在无缝缓冲播放...</text></svg>',
                imgs: []
            },
            {
                id: 'local_p2',
                title: '3D创意海报展示',
                description: '创意排版与视觉重构，专注于多维度光影塑造与极简排版布局，完美适配不同画幅比例。',
                type: '3D作品',
                year: 2026,
                month: 5,
                videoUrl: '',
                coverImage: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000"><rect width="800" height="1000" fill="%2318181b"/><text x="50%25" y="50%25" font-family="sans-serif" font-weight="bold" font-size="24" fill="%233f3f46" text-anchor="middle" dominant-baseline="middle">创意设计海报 01</text></svg>',
                imgs: [
                    'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000"><rect width="800" height="1000" fill="%2318181b"/><text x="50%25" y="50%25" font-family="sans-serif" font-weight="bold" font-size="24" fill="%233f3f46" text-anchor="middle" dominant-baseline="middle">创意设计海报 01</text></svg>',
                    'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000"><rect width="800" height="1000" fill="%2327272a"/><text x="50%25" y="50%25" font-family="sans-serif" font-weight="bold" font-size="24" fill="%2352525b" text-anchor="middle" dominant-baseline="middle">创意设计海报 02</text></svg>'
                ]
            }
        ];

        // ========================================================
        // 💡 100% 纯原生 React SVG 图标组件
        // ========================================================
        const Icon = ({ name, size = 18, className = "" }) => {
            const svgProps = {
                width: size,
                height: size,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: "2",
                strokeLinecap: "round",
                strokeLinejoin: "round",
                className: `inline-flex align-middle select-none ${className}`
            };
            switch (name) {
                case 'x': return <svg {...svgProps}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
                case 'edit-3': return <svg {...svgProps}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
                case 'trash-2': return <svg {...svgProps}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
                case 'arrow-up-circle': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><polyline points="16 12 12 8 8 12"></polyline><line x1="12" y1="16" x2="12" y2="8"></line></svg>;
                case 'eye': return <svg {...svgProps}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
                case 'eye-off': return <svg {...svgProps}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.49 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
                case 'upload': return <svg {...svgProps}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
                case 'image': return <svg {...svgProps}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
                case 'layers': return <svg {...svgProps}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polygon points="2 17 12 22 22 17"></polygon><polygon points="2 12 12 17 22 12"></polygon></svg>;
                case 'tag': return <svg {...svgProps}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>;
                case 'calendar': return <svg {...svgProps}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
                case 'chevron-left': return <svg {...svgProps}><polyline points="15 18 9 12 15 6"></polyline></svg>;
                case 'chevron-right': return <svg {...svgProps}><polyline points="9 18 15 12 9 6"></polyline></svg>;
                case 'share-2': return <svg {...svgProps}><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>;
                case 'log-out': return <svg {...svgProps}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
                case 'layout': return <svg {...svgProps}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;
                case 'arrow-right': return <svg {...svgProps}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
                case 'plus': return <svg {...svgProps}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
                default: return null;
            }
        };

        const WatermarkedDisplay = ({ src, watermarkText, alt, className }) => {
            const [processedSrc, setProcessedSrc] = useState('');
            useEffect(() => {
                if (!src) return;
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = src;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const fontSize = Math.max(24, canvas.width / 15);
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
                    ctx.fillText(watermarkText || "PORTFOLIO", canvas.width / 2, canvas.height / 2);
                    setProcessedSrc(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.onerror = () => {
                    setProcessedSrc(src);
                };
            }, [src, watermarkText]);
            return <img src={processedSrc || src} alt={alt} className={`${className} transition-opacity duration-700 ${!processedSrc ? 'opacity-30' : 'opacity-100'}`} />;
        };

        const MediaRenderer = ({ videoUrl, coverImg, watermarkText, alt, className }) => {
            if (videoUrl && videoUrl.trim() !== '') {
                if (videoUrl.includes('<iframe') || videoUrl.includes('player.bilibili.com') || videoUrl.includes('iframe')) {
                    let src = videoUrl;
                    if (videoUrl.includes('<iframe')) {
                        const match = videoUrl.match(/src="([^"]+)"/);
                        if (match) src = match[1];
                    }
                    if (src.startsWith('//')) src = 'https:' + src;
                    return (
                        <div className="aspect-video w-full rounded-t-big overflow-hidden bg-black">
                            <iframe src={src} scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" className="w-full h-full"></iframe>
                        </div>
                    );
                } else {
                    return (
                        <video src={videoUrl} autoplay loop muted playsinline controls className="w-full h-auto block bg-black rounded-t-big" style={{ maxHeight: '85vh' }}></video>
                    );
                }
            }
            return <WatermarkedDisplay src={coverImg} watermarkText={watermarkText} alt={alt} className={className} />;
        };

        // 💡 极其稳健的 UTF-8 级 Base64 转码机制
        const b64EncodeUnicode = (str) => {
            const bytes = new TextEncoder().encode(str);
            let binary = '';
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        };

        const b64DecodeUnicode = (str) => {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new TextDecoder().decode(bytes);
        };

        const App = () => {
            const [owner, setOwner] = useState('');
            const [repo, setRepo] = useState('');
            const [branch, setBranch] = useState('main');
            const [path, setPath] = useState('db.json');
            const [accessToken, setAccessToken] = useState('');
            const [fileSha, setFileSha] = useState(''); 
            
            const [isLoaded, setIsLoaded] = useState(false);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminUI, setShowAdminUI] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            
            // UI 状态
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: '', onConfirm: null });

            const [config, setConfig] = useState(LOCAL_FALLBACK_CONFIG);
            const [categories, setCategories] = useState(LOCAL_FALLBACK_CATEGORIES);
            const [projects, setProjects] = useState(LOCAL_FALLBACK_PROJECTS);
            const [activeCategory, setActiveCategory] = useState('全部');
            const [activeYear, setActiveYear] = useState('全部');
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ title: '', description: '', type: '全部', year: new Date().getFullYear(), month: new Date().getMonth() + 1, images: [], videoUrl: '' });
            const [previewIndices, setPreviewIndices] = useState({});
            
            const fileInputRef = useRef(null);
            const headerFileInputRef = useRef(null);

            const triggerToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 4000);
            };

            const triggerConfirm = (title, onConfirm) => {
                setConfirmModal({ show: true, title, onConfirm });
            };

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlOwner = params.get('owner');
                const urlRepo = params.get('repo');
                const urlBranch = params.get('branch') || 'main';

                const cachedOwner = localStorage.getItem('gh_portfolio_owner');
                const cachedRepo = localStorage.getItem('gh_portfolio_repo');
                const cachedToken = localStorage.getItem('gh_portfolio_token');

                if (cachedToken) {
                    setAccessToken(cachedToken);
                    setIsAdminMode(true);
                    setShowAdminUI(true); 
                }

                if (!urlOwner && !urlRepo && cachedOwner && cachedRepo) {
                    window.location.href = `${window.location.origin}${window.location.pathname}?owner=${cachedOwner}&repo=${cachedRepo}&branch=${urlBranch}`;
                    return;
                }

                if (urlOwner && urlRepo) {
                    setOwner(urlOwner);
                    setRepo(urlRepo);
                    setBranch(urlBranch);
                    localStorage.setItem('gh_portfolio_owner', urlOwner);
                    localStorage.setItem('gh_portfolio_repo', urlRepo);
                    loadDataFromGitHub(urlOwner, urlRepo, urlBranch, cachedToken);
                } else {
                    setIsLoaded(true);
                }
            }, []);

            const fetchShaOnly = async (own, rep, br, tok) => {
                try {
                    const headers = tok ? { 'Authorization': `Bearer ${tok.trim()}` } : {};
                    const apiUrl = `https://api.github.com/repos/${own}/${rep}/contents/${path}?ref=${br}&t=${Date.now()}_${Math.random()}`;
                    const res = await fetch(apiUrl, { headers });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.sha) {
                            setFileSha(data.sha);
                            localStorage.setItem('github_file_sha', data.sha);
                        }
                    }
                } catch(e) {}
            };

            const loadDataFromGitHub = async (own, rep, br, tok) => {
                const useApiFirst = !!tok;
                const cacheBuster = `${Date.now()}_${Math.random()}`;
                const cdnUrl = `https://raw.gitmirror.com/${own}/${rep}/${br}/${path}?t=${cacheBuster}`;
                const jsdelivrUrl = `https://gcore.jsdelivr.net/gh/${own}/${rep}@${br}/${path}?t=${cacheBuster}`;
                const apiUrl = `https://api.github.com/repos/${own}/${rep}/contents/${path}?ref=${br}&t=${cacheBuster}`;
                const rawUrl = `https://raw.githubusercontent.com/${own}/${rep}/${br}/${path}?t=${cacheBuster}`;
                const tokenHeaders = tok ? { 'Authorization': `Bearer ${tok.trim()}` } : {};

                if (useApiFirst) {
                    try {
                        const res = await fetch(apiUrl, { headers: tokenHeaders });
                        if (!res.ok) {
                            if (res.status === 404) {
                                setProjects(LOCAL_FALLBACK_PROJECTS);
                                setCategories(LOCAL_FALLBACK_CATEGORIES);
                                setConfig(LOCAL_FALLBACK_CONFIG);
                                setFileSha('');
                                localStorage.removeItem('github_file_sha');
                                triggerToast("✨ 仓库连接成功！检测到是一个全新的空画廊，已为您自动加载演示模板。发布作品将自动生成真实数据库！", "success");
                                setIsLoaded(true);
                                return;
                            }
                            throw new Error(`GitHub 接口状态异常: ${res.status}`);
                        }

                        const apiData = await res.json();
                        if (apiData.sha) {
                            setFileSha(apiData.sha);
                            localStorage.setItem('github_file_sha', apiData.sha);
                        }
                        const decodedStr = b64DecodeUnicode(apiData.content.replace(/\s/g, ''));
                        applyLoadedData(JSON.parse(decodedStr));
                        triggerToast("管理后台：已极速同步云端最新数据", "success");
                        setIsLoaded(true);
                        return;
                    } catch(e) {
                        console.warn("API 直连失败，尝试备用 Raw 通道...", e);
                        try {
                            const resRaw = await fetch(rawUrl);
                            if (resRaw.status === 404) {
                                setProjects(LOCAL_FALLBACK_PROJECTS);
                                setCategories(LOCAL_FALLBACK_CATEGORIES);
                                setConfig(LOCAL_FALLBACK_CONFIG);
                                setFileSha('');
                                triggerToast("✨ 直连连接成功！", "success");
                                setIsLoaded(true);
                                return;
                            }
                            if (!resRaw.ok) throw new Error(`Raw直连失败`);
                            const data = await resRaw.json();
                            applyLoadedData(data);
                            fetchShaOnly(own, rep, br, tok);
                            setIsLoaded(true);
                            return;
                        } catch(rawErr) {
                            console.error("所有通道均失败", rawErr);
                            triggerToast(`获取数据失败，请确认梯子是否开启或 Token 权限是否正常分配。`, "error");
                        }
                    }
                }

                try {
                    const res = await fetch(cdnUrl);
                    if (res.ok) {
                        const data = await res.json();
                        applyLoadedData(data);
                        fetchShaOnly(own, rep, br, tok);
                        setIsLoaded(true);
                        return;
                    }
                } catch(e) {}

                try {
                    const res = await fetch(jsdelivrUrl);
                    if (res.ok) {
                        const data = await res.json();
                        applyLoadedData(data);
                        fetchShaOnly(own, rep, br, tok);
                        setIsLoaded(true);
                        return;
                    }
                } catch(e) {}

                try {
                    const res = await fetch(apiUrl, { headers: tokenHeaders });
                    if (res.ok) {
                        const apiData = await res.json();
                        if (apiData.sha) setFileSha(apiData.sha);
                        const decodedStr = b64DecodeUnicode(apiData.content.replace(/\s/g, ''));
                        applyLoadedData(JSON.parse(decodedStr));
                        setIsLoaded(true);
                        return;
                    }
                } catch(e) {
                    triggerToast("目前处于本地离线模式", "info");
                } finally {
                    setIsLoaded(true);
                }
            };

            const applyLoadedData = (data) => {
                if (data.config) setConfig(data.config);
                if (data.categories) setCategories(data.categories);
                if (data.projects) setProjects(data.projects);
            };

            const saveDataToGitHub = async (updatedConfig, updatedCats, updatedProjs) => {
                if (!accessToken) {
                    triggerToast("您当前处于只读模式。请先绑定您的安全写入令牌。", "warning");
                    return;
                }
                setIsSyncing(true);
                try {
                    const commitData = {
                        config: updatedConfig || config,
                        categories: updatedCats || categories,
                        projects: updatedProjs || projects
                    };
                    const base64Content = b64EncodeUnicode(JSON.stringify(commitData));
                    
                    let sha = fileSha || localStorage.getItem('github_file_sha') || '';
                    const getShaUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}&t=${Date.now()}`;
                    
                    try {
                        const shaRes = await fetch(getShaUrl, {
                            headers: { 'Authorization': `Bearer ${accessToken.trim()}` }
                        });
                        if (shaRes.ok) {
                            const shaData = await shaRes.json();
                            sha = shaData.sha;
                        } else if (shaRes.status === 404) {
                            sha = '';
                        }
                    } catch(shaErr) {
                        console.warn("获取 SHA 失败，尝试继续写入...");
                    }

                    const saveUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                    const payload = {
                        content: base64Content,
                        message: `Upload via Pro.folio App [${new Date().toLocaleString()}]`,
                        branch: branch
                    };
                    if (sha) payload.sha = sha;

                    const res = await fetch(saveUrl, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${accessToken.trim()}`
                        },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        const resData = await res.json();
                        if (resData.content && resData.content.sha) {
                            setFileSha(resData.content.sha);
                            localStorage.setItem('github_file_sha', resData.content.sha);
                        }
                    } else {
                        if (res.status === 401) {
                            throw new Error("Token 密钥不正确");
                        } else if (res.status === 403) {
                            throw new Error("权限不足，请确认已勾选 Read and write");
                        } else if (res.status === 409) {
                            throw new Error("操作冲突，请刷新页面后再试！");
                        } else {
                            throw new Error("写入请求被拒绝");
                        }
                    }
                } catch (e) {
                    throw e;
                } finally {
                    setIsSyncing(false);
                }
            };

            const processImageSafe = async (base64Str, maxWidth = 1200, quality = 0.75) => {
                const perform = (src, w, q) => new Promise(res => {
                    const img = new Image(); img.src = src;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > w) { height = (w / width) * height; width = w; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = "high";
                        ctx.drawImage(img, 0, 0, width, height);
                        res(canvas.toDataURL('image/jpeg', q));
                    };
                });
                let result = await perform(base64Str, maxWidth, quality);
                while (result.length > 200000 && maxWidth > 400) {
                    maxWidth = Math.floor(maxWidth * 0.85);
                    quality = Math.max(0.4, quality - 0.1);
                    result = await perform(base64Str, maxWidth, quality);
                }
                return result;
            };

                localStorage.setItem('gh_portfolio_owner', gOwner);
                localStorage.setItem('gh_portfolio_repo', gRepo);
                if (gToken) {
                    localStorage.setItem('gh_portfolio_token', gToken);
                    setAccessToken(gToken);
                    setIsAdminMode(true);
                }

                try {

                    let processedImgs = [];
                    if (form.images.length > 0) {
                        thumb = await processImageSafe(form.images[0], 350, 0.5);
                        processedImgs = await Promise.all(form.images.map(img => processImageSafe(img, 1200, 0.75)));
                    } else {

                    }

                    const existingProj = projects.find(p => p.id === editingId);
                    const newProj = {

                        imgs: processedImgs,
                        isHidden: editingId ? (existingProj?.isHidden || false) : false,
                        priority: editingId ? (existingProj?.priority || Date.now()) : Date.now(),
                    };
                    let newProjectsList = [];

                    await saveDataToGitHub(config, categories, newProjectsList);

                    triggerToast("发布成功！作品已无缝锁入云端", "success");

                    setForm({ title: '', description: '', type: '全部', year: new Date().getFullYear(), month: new Date().getMonth() + 1, images: [], videoUrl: '' });
                    setEditingId(null);
                } catch (e) {
                    triggerToast(`同步失败: ${e.message}`, "error");
                } finally {
                    setIsSyncing(false);
                }
            };

                                        <input required name="gRepo" placeholder="例如：picture (注意需要是 Public 公开可见)" className="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm text-slate-800 font-mono" />

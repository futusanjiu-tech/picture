<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO.FOLIO - 极速稳定画廊</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRO.FOLIO">
    <link rel="apple-touch-icon" href="https://img.icons8.com/?size=512&id=118557&format=png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://gcore.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://gcore.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://gcore.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .invisible-scroll-box { max-height: 85vh; overflow-y: auto !important; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
        .invisible-scroll-box::-webkit-scrollbar { display: none; }
        .transition-all-fast { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .max-w-gallery { max-width: 1900px; margin-left: auto; margin-right: auto; }
        .rounded-big { border-radius: 1.5rem; }
        
        .gallery-columns { column-gap: 0.5rem; column-count: 2; }
        @media (min-width: 768px) { .gallery-columns { column-count: 3; column-gap: 1.5rem; } }
        @media (min-width: 1024px) { .gallery-columns { column-count: 4; } }
        @media (min-width: 1280px) { .gallery-columns { column-count: 5; } }
        
        .break-inside-avoid { break-inside: avoid; -webkit-column-break-inside: avoid; }
        body { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-white selection:bg-zinc-900 selection:text-white text-zinc-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LOCAL_FALLBACK_CATEGORIES = [
            { id: 'All', label: '全部', order: 0 },
            { id: 'c_1', label: '3D作品', order: 1 },
            { id: 'c_2', label: '动态视频', order: 2 }
        ];

        const LOCAL_FALLBACK_CONFIG = {
            header: { title: 'MY CREATIVE WORK', subtitle: 'PRO.PORTFOLIO', headerImage: '' },
            watermark: '© COPY PROTECTION',
            borderRadius: 16,
            titleColor: '#18181b',
            textColor: '#71717a'
        };

        const LOCAL_FALLBACK_PROJECTS = [
            {
                id: 'local_demo',
                title: '云端直连模式就绪',
                description: '这是一个演示项目。您的代码已成功编译，随时可以连接您的 GitHub 数据库并输入云端图片链接。',
                type: '3D作品',
                year: 2026,
                month: 7,
                videoUrl: '',
                coverImage: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="%23f4f4f5"/><text x="50%25" y="50%25" font-family="sans-serif" font-weight="bold" font-size="24" fill="%23a1a1aa" text-anchor="middle" dominant-baseline="middle">欢迎使用极速云端画廊</text></svg>',
                imgs: []
            }
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const svgProps = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: `inline-flex align-middle select-none ${className}` };
            switch (name) {
                case 'x': return <svg {...svgProps}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
                case 'edit-3': return <svg {...svgProps}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
                case 'trash-2': return <svg {...svgProps}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
                case 'arrow-up-circle': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><polyline points="16 12 12 8 8 12"></polyline><line x1="12" y1="16" x2="12" y2="8"></line></svg>;
                case 'eye': return <svg {...svgProps}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
                case 'eye-off': return <svg {...svgProps}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.49 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
                case 'upload': return <svg {...svgProps}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
                case 'image': return <svg {...svgProps}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
                case 'layers': return <svg {...svgProps}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polygon points="2 17 12 22 22 17"></polygon><polygon points="2 12 12 17 22 12"></polygon></svg>;
                case 'tag': return <svg {...svgProps}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>;
                case 'calendar': return <svg {...svgProps}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
                case 'clock': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
                case 'chevron-left': return <svg {...svgProps}><polyline points="15 18 9 12 15 6"></polyline></svg>;
                case 'chevron-right': return <svg {...svgProps}><polyline points="9 18 15 12 9 6"></polyline></svg>;
                case 'share-2': return <svg {...svgProps}><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>;
                case 'log-out': return <svg {...svgProps}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
                case 'layout': return <svg {...svgProps}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;
                case 'arrow-right': return <svg {...svgProps}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
                case 'plus': return <svg {...svgProps}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
                case 'link': return <svg {...svgProps}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;
                default: return null;
            }
        };

        const WatermarkedDisplay = ({ src, watermarkText, alt, className }) => {
            return (
                <div className="relative inline-block w-full h-full select-none">
                    <img src={src} alt={alt} loading="lazy" className={`${className} block w-full h-auto`} />
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden">
                        <span className="text-white/35 font-bold text-xl md:text-3xl rotate-[-15deg] whitespace-nowrap">
                            {watermarkText || "PORTFOLIO"}
                        </span>
                    </div>
                </div>
            );
        };

        const MediaRenderer = ({ videoUrl, coverImg, watermarkText, alt, className }) => {
            if (videoUrl && videoUrl.trim() !== '') {
                if (videoUrl.includes('<iframe') || videoUrl.includes('player.bilibili.com') || videoUrl.includes('iframe')) {
                    let src = videoUrl;
                    if (videoUrl.includes('<iframe')) {
                        const match = videoUrl.match(/src="([^"]+)"/);
                        if (match) src = match[1];
                    }
                    if (src.startsWith('//')) src = 'https:' + src;
                    return (
                        <div className="aspect-video w-full rounded-t-big overflow-hidden bg-black">
                            <iframe src={src} scrolling="no" border="0" frameBorder="0" frameSpacing="0" allowFullScreen={true} className="w-full h-full"></iframe>
                        </div>
                    );
                } else {
                    return (
                        <video src={videoUrl} autoPlay loop muted playsInline controls className="w-full h-auto block bg-black rounded-t-big" style={{ maxHeight: '85vh' }}></video>
                    );
                }
            }
            return <WatermarkedDisplay src={coverImg} watermarkText={watermarkText} alt={alt} className={className} />;
        };

        const b64EncodeUnicode = (str) => {
            const bytes = new TextEncoder().encode(str);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) { 
                binary += String.fromCharCode(bytes[i]); 
            }
            return btoa(binary);
        };

        const b64DecodeUnicode = (str) => {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) { 
                bytes[i] = binary.charCodeAt(i); 
            }
            return new TextDecoder().decode(bytes);
        };

        const App = () => {
            const [owner, setOwner] = useState('');
            const [repo, setRepo] = useState('');
            const [branch, setBranch] = useState('main');
            const [path, setPath] = useState('db.json');
            const [accessToken, setAccessToken] = useState('');
            const [fileSha, setFileSha] = useState(''); 
            
            const [isLoaded, setIsLoaded] = useState(false);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminUI, setShowAdminUI] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isExpired, setIsExpired] = useState(false); 

            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: '', onConfirm: null });
            const [shareModal, setShareModal] = useState(false); 

            const [config, setConfig] = useState(LOCAL_FALLBACK_CONFIG);
            const [categories, setCategories] = useState(LOCAL_FALLBACK_CATEGORIES);
            const [projects, setProjects] = useState(LOCAL_FALLBACK_PROJECTS);
            const [activeCategory, setActiveCategory] = useState('全部');
            const [activeYear, setActiveYear] = useState('全部');

            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ 
                title: '', 
                description: '', 
                type: '全部', 
                year: new Date().getFullYear(), 
                month: new Date().getMonth() + 1, 
                imageUrlsText: '', 
                videoUrl: '' 
            });
            
            const [previewIndices, setPreviewIndices] = useState({});
            const headerFileInputRef = useRef(null);

            const triggerToast = (msg, type = "info") => {
                setToast({ show: true, message: msg, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
            };

            const triggerConfirm = (title, onConfirm) => { 
                setConfirmModal({ show: true, title, onConfirm }); 
            };

            const handleCopyToken = () => {
                const t = document.createElement("textarea"); 
                t.value = accessToken; 
                document.body.appendChild(t); 
                t.select(); 
                document.execCommand('copy'); 
                document.body.removeChild(t);
                triggerToast("访问令牌已复制至剪贴板", "success");
            };

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlOwner = params.get('owner'); 
                const urlRepo = params.get('repo'); 
                const urlBranch = params.get('branch') || 'main'; 
                const urlExpire = params.get('expire'); 

                if (urlExpire) {
                    if (Date.now() > parseInt(urlExpire, 10)) {
                        setIsExpired(true);
                        if (localStorage.getItem('gh_portfolio_token')) { 
                            setAccessToken(localStorage.getItem('gh_portfolio_token')); 
                        }
                        return; 
                    }
                }

                const cachedOwner = localStorage.getItem('gh_portfolio_owner');
                const cachedRepo = localStorage.getItem('gh_portfolio_repo');
                const cachedToken = localStorage.getItem('gh_portfolio_token');

                if (cachedToken) { 
                    setAccessToken(cachedToken); 
                    setIsAdminMode(true); 
                    setShowAdminUI(true); 
                }

                if (!urlOwner && !urlRepo && cachedOwner && cachedRepo) {
                    window.location.href = `${window.location.origin}${window.location.pathname}?owner=${cachedOwner}&repo=${cachedRepo}&branch=${urlBranch}`;
                    return;
                }

                if (urlOwner && urlRepo) {
                    setOwner(urlOwner); 
                    setRepo(urlRepo); 
                    setBranch(urlBranch);
                    localStorage.setItem('gh_portfolio_owner', urlOwner); 
                    localStorage.setItem('gh_portfolio_repo', urlRepo);
                    loadDataFromGitHub(urlOwner, urlRepo, urlBranch, cachedToken);
                } else {
                    setIsLoaded(true);
                }
            }, []);

            const fetchShaOnly = async (own, rep, br, tok) => {
                try {
                    const headers = tok ? { 'Authorization': `Bearer ${tok.trim()}` } : {};
                    const res = await fetch(`https://api.github.com/repos/${own}/${rep}/contents/${path}?ref=${br}&t=${Date.now()}_${Math.random()}`, { headers });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.sha) { 
                            setFileSha(data.sha); 
                            localStorage.setItem('github_file_sha', data.sha); 
                        }
                    }
                } catch(e) {}
            };

            const loadDataFromGitHub = async (own, rep, br, tok) => {
                const useApiFirst = !!tok;
                const cacheBuster = `${Date.now()}_${Math.random()}`;
                const cdnUrl = `https://raw.gitmirror.com/${own}/${rep}/${br}/${path}?t=${cacheBuster}`;
                const jsdelivrUrl = `https://gcore.jsdelivr.net/gh/${own}/${rep}@${br}/${path}?t=${cacheBuster}`;
                const apiUrl = `https://api.github.com/repos/${own}/${rep}/contents/${path}?ref=${br}&t=${cacheBuster}`;
                const rawUrl = `https://raw.githubusercontent.com/${own}/${rep}/${br}/${path}?t=${cacheBuster}`;
                const tokenHeaders = tok ? { 'Authorization': `Bearer ${tok.trim()}` } : {};

                if (useApiFirst) {
                    try {
                        const res = await fetch(apiUrl, { headers: tokenHeaders });
                        if (!res.ok) {
                            if (res.status === 404) {
                                setProjects(LOCAL_FALLBACK_PROJECTS); 
                                setCategories(LOCAL_FALLBACK_CATEGORIES); 
                                setConfig(LOCAL_FALLBACK_CONFIG); 
                                setFileSha(''); 
                                localStorage.removeItem('github_file_sha');
                                triggerToast("✨ 仓库连接成功！这是全新的画廊，已自动加载演示模板。", "success");
                                setIsLoaded(true); 
                                return;
                            }
                            throw new Error(`GitHub 接口状态异常: ${res.status}`);
                        }
                        const apiData = await res.json();
                        if (apiData.sha) { 
                            setFileSha(apiData.sha); 
                            localStorage.setItem('github_file_sha', apiData.sha); 
                        }
                        applyLoadedData(JSON.parse(b64DecodeUnicode(apiData.content.replace(/\s/g, ''))));
                        triggerToast("管理后台：已极速同步云端最新数据", "success");
                        setIsLoaded(true); 
                        return;
                    } catch(e) {
                        try {
                            const resRaw = await fetch(rawUrl);
                            if (resRaw.status === 404) {
                                setProjects(LOCAL_FALLBACK_PROJECTS); 
                                setCategories(LOCAL_FALLBACK_CATEGORIES); 
                                setConfig(LOCAL_FALLBACK_CONFIG); 
                                setFileSha('');
                                triggerToast("✨ 直连连接成功！", "success"); 
                                setIsLoaded(true); 
                                return;
                            }
                            if (!resRaw.ok) throw new Error(`Raw直连失败`);
                            applyLoadedData(await resRaw.json()); 
                            fetchShaOnly(own, rep, br, tok); 
                            setIsLoaded(true); 
                            return;
                        } catch(rawErr) { 
                            triggerToast(`获取数据失败，请确认网络代理或 Token 权限。`, "error"); 
                        }
                    }
                }

                try {
                    const res = await fetch(cdnUrl);
                    if (res.ok) { 
                        applyLoadedData(await res.json()); 
                        fetchShaOnly(own, rep, br, tok); 
                        setIsLoaded(true); 
                        return; 
                    }
                } catch(e) {}
                
                try {
                    const res = await fetch(jsdelivrUrl);
                    if (res.ok) { 
                        applyLoadedData(await res.json()); 
                        fetchShaOnly(own, rep, br, tok); 
                        setIsLoaded(true); 
                        return; 
                    }
                } catch(e) {}
                
                try {
                    const res = await fetch(apiUrl, { headers: tokenHeaders });
                    if (res.ok) {
                        const apiData = await res.json();
                        if (apiData.sha) {
                            setFileSha(apiData.sha);
                        }
                        applyLoadedData(JSON.parse(b64DecodeUnicode(apiData.content.replace(/\s/g, '')))); 
                        setIsLoaded(true); 
                        return;
                    }
                } catch(e) { 
                    triggerToast("目前处于本地离线模式", "info"); 
                } finally { 
                    setIsLoaded(true); 
                }
            };

            const applyLoadedData = (data) => {
                if (data.config) setConfig(data.config);
                if (data.categories) setCategories(data.categories);
                if (data.projects) setProjects(data.projects);
            };

            const saveDataToGitHub = async (updatedConfig, updatedCats, updatedProjs) => {
                if (!accessToken) { 
                    triggerToast("您当前处于只读模式。请先绑定您的安全写入令牌。", "warning"); 
                    return; 
                }
                setIsSyncing(true);
                try {
                    const commitData = { 
                        config: updatedConfig || config, 
                        categories: updatedCats || categories, 
                        projects: updatedProjs || projects 
                    };
                    const base64Content = b64EncodeUnicode(JSON.stringify(commitData));
                    let sha = fileSha || localStorage.getItem('github_file_sha') || '';
                    
                    try {
                        const shaRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}&t=${Date.now()}`, { 
                            headers: { 'Authorization': `Bearer ${accessToken.trim()}` } 
                        });
                        if (shaRes.ok) { 
                            sha = (await shaRes.json()).sha; 
                        } else if (shaRes.status === 404) { 
                            sha = ''; 
                        }
                    } catch(shaErr) {}

                    const payload = { 
                        content: base64Content, 
                        message: `Upload via Pro.folio App [${new Date().toLocaleString()}]`, 
                        branch: branch
                    };
                    if (sha) {
                        payload.sha = sha;
                    }

                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Authorization': `Bearer ${accessToken.trim()}` 
                        },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        const resData = await res.json();
                        if (resData.content && resData.content.sha) { 
                            setFileSha(resData.content.sha); 
                            localStorage.setItem('github_file_sha', resData.content.sha); 
                        }
                    } else {
                        if (res.status === 401) throw new Error("Token 密钥不正确");
                        else if (res.status === 403) throw new Error("权限不足，请确认已勾选 Read and write 权限");
                        else if (res.status === 409) throw new Error("操作冲突，请刷新页面后再试！");
                        else throw new Error("写入请求被拒绝");
                    }
                } catch (e) { 
                    throw e; 
                } finally { 
                    setIsSyncing(false); 
                }
            };

            const processImageSafe = async (base64Str, maxWidth = 1200, quality = 0.75) => {
                const perform = (src, w, q) => new Promise(res => {
                    const img = new Image(); 
                    img.src = src;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > w) { 
                            height = (w / width) * height; 
                            width = w; 
                        }
                        canvas.width = width; 
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true; 
                        ctx.imageSmoothingQuality = "high";
                        ctx.drawImage(img, 0, 0, width, height); 
                        res(canvas.toDataURL('image/jpeg', q));
                    };
                });
                let result = await perform(base64Str, maxWidth, quality);
                while (result.length > 200000 && maxWidth > 400) {
                    maxWidth = Math.floor(maxWidth * 0.85); 
                    quality = Math.max(0.4, quality - 0.1); 
                    result = await perform(base64Str, maxWidth, quality);
                }
                return result;
            };

            const handleSetupSubmit = (e) => {
                e.preventDefault();
                const gOwner = e.target.gOwner.value.trim(); 
                const gRepo = e.target.gRepo.value.trim(); 
                const gToken = e.target.gToken.value.trim(); 
                const gBranch = e.target.gBranch?.value.trim() || 'main';
                
                localStorage.setItem('gh_portfolio_owner', gOwner); 
                localStorage.setItem('gh_portfolio_repo', gRepo);
                if (gToken) { 
                    localStorage.setItem('gh_portfolio_token', gToken); 
                    setAccessToken(gToken); 
                    setIsAdminMode(true); 
                }
                window.location.href = `${window.location.origin}${window.location.pathname}?owner=${gOwner}&repo=${gRepo}&branch=${gBranch}`;
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                
                const urls = (form.imageUrlsText || '').split('\n').map(u => u.trim()).filter(Boolean);

                if (urls.length === 0 && (!form.videoUrl || form.videoUrl.trim() === '')) {
                    return triggerToast('请至少粘贴一张图片链接，或填写视频链接', "warning");
                }
                
                setIsSyncing(true);
                const pid = editingId || `p_${Date.now()}`;
                
                try {
                    let thumb = '';
                    let processedImgs = urls;
                    
                    if (urls.length > 0) {
                        thumb = urls[0];
                    } else {
                        thumb = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="%23f4f4f5"/><text x="50%25" y="50%25" font-family="sans-serif" font-weight="bold" font-size="24" fill="%23a1a1aa" text-anchor="middle" dominant-baseline="middle">视频作品缓冲中...</text></svg>';
                    }

                    const existingProj = projects.find(p => p.id === editingId);
                    const newProj = {
                        title: form.title,
                        description: form.description,
                        type: form.type,
                        year: form.year,
                        month: form.month,
                        videoUrl: form.videoUrl,
                        id: pid,
                        coverImage: thumb,
                        imgs: processedImgs,
                        isHidden: editingId ? (existingProj?.isHidden || false) : false,
                        priority: editingId ? (existingProj?.priority || Date.now()) : Date.now(),
                    };

                    let newProjectsList = editingId ? projects.map(p => p.id === editingId ? newProj : p) : [newProj, ...projects];

                    await saveDataToGitHub(config, categories, newProjectsList);
                    
                    setProjects(newProjectsList);
                    triggerToast("发布成功！云端链接已无缝锁入数据库", "success");

                    setForm({ title: '', description: '', type: '全部', year: new Date().getFullYear(), month: new Date().getMonth() + 1, imageUrlsText: '', videoUrl: '' });
                    setEditingId(null);
                } catch (e) {
                    triggerToast(`同步失败: ${e.message}`, "error");
                } finally {
                    setIsSyncing(false);
                }
            };

            const toggleVisibility = async (projectId, currentHidden) => {
                const nextProjs = projects.map(p => p.id === projectId ? { ...p, isHidden: !currentHidden } : p);
                try { 
                    await saveDataToGitHub(config, categories, nextProjs); 
                    setProjects(nextProjs); 
                    triggerToast("修改可见性成功", "success"); 
                } catch (e) { 
                    triggerToast(`修改失败: ${e.message}`, "error"); 
                }
            };

            const setAsTop = async (projectId) => {
                const nextProjs = projects.map(p => p.id === projectId ? { ...p, priority: Date.now() } : p);
                try { 
                    await saveDataToGitHub(config, categories, nextProjs); 
                    setProjects(nextProjs); 
                    triggerToast("置顶成功！", "success"); 
                } catch (e) { 
                    triggerToast(`置顶失败: ${e.message}`, "error"); 
                }
            };

            const handleDeleteProject = (projectId) => {
                triggerConfirm('确认要永久从仓库中移除此作品吗?', async () => {
                    const nextProjs = projects.filter(p => p.id !== projectId);
                    try { 
                        await saveDataToGitHub(config, categories, nextProjs); 
                        setProjects(nextProjs); 
                        triggerToast("作品已成功删除", "success"); 
                    } catch (e) { 
                        triggerToast(`删除失败: ${e.message}`, "error"); 
                    }
                });
            };

            const handleStartEdit = (project) => {
                setEditingId(project.id);
                setForm({
                    title: project.title || '',
                    description: project.description || '',
                    type: project.type || '全部',
                    year: project.year || new Date().getFullYear(),
                    month: project.month || new Date().getMonth() + 1,
                    imageUrlsText: (project.imgs && Array.isArray(project.imgs)) ? project.imgs.join('\n') : '',
                    videoUrl: project.videoUrl || ''
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setForm({ 
                    title: '', 
                    description: '', 
                    type: '全部', 
                    year: new Date().getFullYear(), 
                    month: new Date().getMonth() + 1, 
                    imageUrlsText: '', 
                    videoUrl: '' 
                });
            };

            const handleHeaderUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const safeHeader = await processImageSafe(reader.result, 1800, 0.7);
                    const newConfig = { ...config, header: { ...config.header, headerImage: safeHeader } };
                    try { 
                        await saveDataToGitHub(newConfig, categories, projects); 
                        setConfig(newConfig); 
                        triggerToast("封面更新成功", "success"); 
                    } catch (err) { 
                        triggerToast(`更新封面失败: ${err.message}`, "error"); 
                    }
                };
                reader.readAsDataURL(file);
            };

            const handleCopyShareLink = (days) => {
                let link = `${window.location.origin}${window.location.pathname}?owner=${owner}&repo=${repo}&branch=${branch}`;
                if (days > 0) { 
                    link += `&expire=${Date.now() + days * 24 * 60 * 60 * 1000}`; 
                }
                const t = document.createElement("textarea"); 
                t.value = link; 
                document.body.appendChild(t); 
                t.select(); 
                document.execCommand('copy'); 
                document.body.removeChild(t);
                triggerToast(days > 0 ? `限时 ${days} 天链接已复制！客户过期将无法访问` : '永久链接已复制！', 'success');
                setShareModal(false);
            };

            const displayProjects = projects
                .filter(p => {
                    if (!isAdminMode || !showAdminUI) { 
                        if (p.isHidden) return false; 
                    }
                    const matchesCategory = activeCategory === '全部' || p.type === activeCategory;
                    const matchesYear = activeYear === '全部' || String(p.year) === String(activeYear);
                    return matchesCategory && matchesYear;
                })
                .sort((a,b) => (b.priority || 0) - (a.priority || 0));

            const availableYears = ['全部', ...new Set(projects.map(p => p.year).filter(Boolean))].sort((a,b) => b - a);

            if (!owner || !repo) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 md:p-8">
                        <div className="w-full max-w-xl bg-white rounded-3xl p-8 md:p-12 shadow-xl border border-slate-100 text-left">
                            <div className="w-16 h-16 bg-zinc-950 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg mb-8">G</div>
                            <h2 className="text-3xl font-black mb-3">连接您的 GitHub 终极数据库</h2>
                            <p className="text-slate-400 text-xs font-semibold mb-8 uppercase tracking-wider">GitHub High-Speed CDN Onboarding</p>
                            
                            <form onSubmit={handleSetupSubmit} className="space-y-6">
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">步骤 1：GitHub 用户名 (Owner)</label>
                                        <input required name="gOwner" placeholder="例如：yourname" className="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm text-slate-800 font-mono" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">步骤 2：公开仓库名称 (Repo)</label>
                                        <input required name="gRepo" placeholder="例如：picture" className="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm text-slate-800 font-mono" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">步骤 3：默认分支 (Branch)</label>
                                        <input required name="gBranch" defaultValue="main" className="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm text-slate-800 font-mono" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">步骤 4：GitHub 访问令牌 (Token)</label>
                                        <input name="gToken" type="password" placeholder="ghp_ 开头，需勾选 repo 权限 (仅上传时需要)" className="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm text-slate-800 font-mono" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-5 bg-zinc-950 hover:bg-zinc-800 text-white rounded-2xl font-black text-sm uppercase shadow-lg shadow-slate-100 transition-all">极速绑定并开启空间</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (isExpired) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 md:p-8 animate-in fade-in duration-700">
                        <div className="w-full max-w-md bg-white rounded-3xl p-10 md:p-12 shadow-xl border border-slate-100 text-center">
                            <div className="w-20 h-20 bg-zinc-100 rounded-full flex items-center justify-center mx-auto mb-8 text-zinc-400 border-4 border-white shadow-md">
                                <Icon name="clock" size={32} />
                            </div>
                            <h2 className="text-2xl font-black mb-3">链接已过期</h2>
                            <p className="text-xs font-bold text-slate-400 mb-10 leading-relaxed">
                                该空间分享链接已超过设定的访问时效，<br/>为了保护创作者权益，内容现已自动隐藏。
                            </p>
                            {accessToken && (
                                <button onClick={() => window.location.href = window.location.pathname} className="w-full py-4 bg-zinc-950 hover:bg-zinc-800 text-white rounded-2xl font-black text-sm uppercase shadow-lg transition-all">返回管理后台</button>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white text-zinc-900">
                    {isSyncing && (
                        <div className="fixed inset-0 z-[1000] bg-white/70 backdrop-blur-md flex flex-col items-center justify-center gap-4 animate-in fade-in duration-300">
                            <div className="w-12 h-12 border-4 border-zinc-200 border-t-zinc-950 rounded-full animate-spin"></div>
                            <p className="text-[10px] font-black uppercase tracking-widest text-zinc-500">正在与云端数据库同步中...</p>
                        </div>
                    )}

                    {toast.show && (
                        <div className="fixed top-8 left-4 right-4 md:left-1/2 md:right-auto md:-translate-x-1/2 z-[1000] bg-zinc-950 text-white rounded-full py-4 px-8 shadow-2xl flex items-center justify-center gap-3 animate-in slide-in-from-top-6 duration-300">
                            <span className="text-xs font-bold leading-none text-center">{toast.message}</span>
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 z-[1000] bg-black/60 backdrop-blur-md flex items-center justify-center p-6 animate-in fade-in duration-200">
                            <div className="w-full max-w-sm bg-white rounded-3xl p-8 shadow-2xl text-center">
                                <h3 className="text-sm font-black mb-6 text-zinc-900">{confirmModal.title}</h3>
                                <div className="flex gap-4">
                                    <button onClick={() => setConfirmModal({ show: false, title: '', onConfirm: null })} className="flex-1 py-3 bg-zinc-100 rounded-full text-xs font-bold text-zinc-500">取消</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ show: false, title: '', onConfirm: null }); }} className="flex-1 py-3 bg-red-600 text-white rounded-full text-xs font-black">确认</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {shareModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/60 backdrop-blur-md flex items-center justify-center p-6 animate-in fade-in duration-200">
                            <div className="w-full max-w-sm bg-white rounded-3xl p-8 shadow-2xl text-center">
                                <div className="w-12 h-12 bg-zinc-100 rounded-full flex items-center justify-center mx-auto mb-4 text-zinc-900"><Icon name="share-2" size={20} /></div>
                                <h3 className="text-lg font-black mb-1 text-zinc-900">分享空间地址</h3>
                                <p className="text-[10px] font-bold text-zinc-400 mb-6 uppercase">请选择链接的有效时长</p>
                                <div className="space-y-3 mb-6">
                                    <button onClick={() => handleCopyShareLink(0)} className="w-full py-4 border border-zinc-200 hover:border-zinc-400 rounded-2xl text-sm font-black transition-all flex justify-between px-6 items-center"><span>永久有效</span> <span className="text-[10px] text-zinc-400 font-bold">无限制</span></button>
                                    <button onClick={() => handleCopyShareLink(7)} className="w-full py-4 border border-zinc-200 hover:border-zinc-400 rounded-2xl text-sm font-black transition-all flex justify-between px-6 items-center"><span>7天后过期</span> <span className="text-[10px] text-orange-400 font-bold">短期项目提案</span></button>
                                    <button onClick={() => handleCopyShareLink(1)} className="w-full py-4 bg-zinc-950 text-white rounded-2xl text-sm font-black shadow-lg hover:scale-[1.02] transition-all flex justify-between px-6 items-center"><span>1天后过期</span> <span className="text-[10px] text-zinc-400 font-bold">阅后即焚级防护</span></button>
                                </div>
                                <button onClick={() => setShareModal(false)} className="py-3 px-6 bg-zinc-100 rounded-full text-xs font-bold text-zinc-500 hover:bg-zinc-200">取消</button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed w-full z-50 bg-white/80 backdrop-blur-xl border-b border-zinc-100 px-4 md:px-10 h-16 md:h-20 flex items-center justify-between">
                        <div className="text-sm md:text-xl font-black tracking-tighter cursor-pointer" onClick={() => window.location.href='/'}>PORTFOLIO.LIVE</div>
                        <div className="flex gap-2">
                            {accessToken ? (
                                <button onClick={() => setShowAdminUI(!showAdminUI)} className={`px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-wider transition-all ${showAdminUI ? 'bg-zinc-950 text-white shadow-xl' : 'bg-zinc-100 text-zinc-600'}`}>{showAdminUI ? '画廊预览' : '内容发布'}</button>
                            ) : (
                                <button onClick={() => {
                                    const tok = prompt("请输入您的 GitHub 个人令牌 (Token)：");
                                    if (tok) { localStorage.setItem('gh_portfolio_token', tok); window.location.reload(); }
                                }} className="px-4 py-2 bg-zinc-100 text-zinc-600 rounded-full text-[10px] font-black uppercase tracking-wider">设置令牌</button>
                            )}
                            {isAdminMode && (
                                <button onClick={() => { localStorage.removeItem('gh_portfolio_token'); localStorage.removeItem('gh_portfolio_owner'); localStorage.removeItem('gh_portfolio_repo'); window.location.reload(); }} className="text-zinc-300 hover:text-red-500 transition-colors"><Icon name="log-out" size={16} /></button>
                            )}
                        </div>
                    </nav>

                    <main className="pt-24 md:pt-32 pb-32 md:pb-48 px-2 md:px-10 max-w-gallery">
                        {accessToken && showAdminUI && (
                            <div className="space-y-6 mb-24 animate-in slide-in-from-top-6 duration-700 text-left">
                                <div className="p-6 md:p-10 bg-zinc-900 rounded-3xl text-white flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
                                    <div className="text-left">
                                        <h3 className="text-xl md:text-2xl font-black mb-1">GitHub 极速工作台 (云直连版)</h3>
                                        <p className="text-zinc-500 text-xs font-semibold uppercase tracking-wider">图片直连腾讯云 COS，数据库体积降低 99%，手机端加载已达性能巅峰。</p>
                                    </div>
                                    <button onClick={() => setShareModal(true)} className="w-full md:w-auto px-6 py-4 bg-white text-zinc-900 rounded-2xl font-black text-xs flex items-center justify-center gap-2 shadow-xl hover:scale-[1.02] active:scale-95 transition-all"><Icon name="share-2" size={14}/> 分享空间地址</button>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 text-left">
                                    <div className="p-8 bg-zinc-50 rounded-3xl border border-zinc-200 shadow-sm space-y-6">
                                        <h4 className="text-[10px] font-black uppercase text-zinc-400 flex items-center gap-2"><Icon name="layout" size={14}/> 主页偏好定制</h4>
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black text-zinc-400 ml-2 uppercase">主页主标题</label>
                                                <input value={config?.header?.title || ''} onChange={e=>{const c={...config, header:{...config.header, title:e.target.value}}; setConfig(c); }} className="w-full bg-white border border-zinc-200 rounded-xl px-5 py-3 outline-none text-xs font-black" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black text-zinc-400 ml-2 uppercase">主页次标题</label>
                                                <input value={config?.header?.subtitle || ''} onChange={e=>{const c={...config, header:{...config.header, subtitle:e.target.value}}; setConfig(c); }} className="w-full bg-white border border-zinc-200 rounded-xl px-5 py-3 outline-none text-xs" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black text-zinc-400 ml-2 uppercase">卡片自定义圆角 ({config?.borderRadius ?? 16}px)</label>
                                                <input type="range" min="0" max="40" value={config?.borderRadius ?? 16} onChange={e=>{const val = parseInt(e.target.value); const c = { ...config, borderRadius: val }; setConfig(c); }} className="w-full accent-zinc-950" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black text-zinc-400 ml-2 uppercase">主页大图封面</label>
                                                <div onClick={() => headerFileInputRef.current.click()} className="w-full py-3 border-2 border-dashed border-zinc-200 rounded-xl flex items-center justify-center gap-2 text-zinc-400 text-xs font-bold cursor-pointer hover:bg-zinc-100 transition-colors">
                                                    <Icon name="image" size={12}/> {config?.header?.headerImage ? '更新当前封面' : '上传封面背景'}
                                                </div>
                                                <input type="file" ref={headerFileInputRef} onChange={handleHeaderUpload} className="hidden" accept="image/*" />
                                            </div>

                                            <div className="space-y-1 pt-2 border-t border-zinc-200">
                                                <label className="text-[9px] font-black text-zinc-400 ml-2 uppercase">安全备份令牌 (防遗失)</label>
                                                <div className="flex gap-2">
                                                    <input type="text" readOnly value={accessToken} className="flex-1 bg-white border border-zinc-200 rounded-xl px-4 py-2 outline-none text-[10px] font-mono text-zinc-400 select-all" />
                                                    <button type="button" onClick={handleCopyToken} className="px-3 py-2 bg-zinc-950 text-white hover:bg-zinc-800 rounded-xl text-[9px] font-black uppercase shrink-0">复制</button>
                                                </div>
                                            </div>
                                            <button type="button" onClick={() => saveDataToGitHub(config, categories, projects)} className="w-full py-3 bg-zinc-900 hover:bg-zinc-800 text-white font-black text-xs rounded-xl uppercase shadow-md transition-colors">手动保存当前定制</button>
                                        </div>

                                        <div className="pt-4 border-t border-zinc-200">
                                            <h4 className="text-[10px] font-black uppercase text-zinc-400 mb-3 flex items-center gap-1"><Icon name="layers" size={12}/> 分类管理中心</h4>
                                            <div className="flex flex-wrap gap-1.5 mb-4">
                                                {categories.map(c => (
                                                    <div key={c.id} className="bg-white border border-zinc-200 rounded-full px-3 py-1.5 text-[10px] font-bold flex items-center gap-1.5 shadow-sm">
                                                        {c.label}
                                                        {c.id !== 'All' && (
                                                            <button 
                                                                type="button" 
                                                                onClick={async () => {
                                                                    const nextCats = categories.filter(item => item.id !== c.id);
                                                                    try { 
                                                                        await saveDataToGitHub(config, nextCats, projects); 
                                                                        setCategories(nextCats); 
                                                                        triggerToast("分类标签已删除", "success"); 
                                                                    } catch (e) { 
                                                                        triggerToast(`删除失败: ${e.message}`, "error"); 
                                                                    }
                                                                }} 
                                                                className="text-zinc-300 hover:text-red-500 transition-colors"
                                                            >
                                                                <Icon name="x" size={10}/>
                                                            </button>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <form onSubmit={async (e)=>{
                                                e.preventDefault(); 
                                                const n = e.target.newCat.value.trim(); 
                                                if (n) {
                                                    const nextCats = [...categories, { id: `c_${Date.now()}`, label: n, order: categories.length }];
                                                    try { 
                                                        await saveDataToGitHub(config, nextCats, projects); 
                                                        setCategories(nextCats); 
                                                        triggerToast("成功新增分类", "success"); 
                                                        e.target.newCat.value = ''; 
                                                    } catch (err) { 
                                                        triggerToast(`新增失败: ${err.message}`, "error"); 
                                                    }
                                                }
                                            }} className="flex gap-2">
                                                <input name="newCat" required placeholder="新分类名称..." className="flex-1 bg-white border border-zinc-200 rounded-xl px-4 py-2.5 text-xs outline-none focus:ring-1 ring-zinc-950/10" />
                                                <button type="submit" className="px-4 py-2.5 bg-zinc-950 text-white rounded-xl text-[10px] font-black uppercase shrink-0">添加</button>
                                            </form>
                                        </div>
                                    </div>
                                    
                                    <div className="lg:col-span-2 p-8 bg-zinc-50 rounded-3xl border border-zinc-200 shadow-sm">
                                        <h4 className="text-[10px] font-black uppercase text-zinc-400 mb-6 flex items-center gap-2">
                                            <Icon name={editingId ? "edit-3" : "plus"} size={14}/> {editingId ? '二次编辑作品信息' : '快捷发布新作品数据'}
                                        </h4>
                                        <form onSubmit={handleUpload} className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                                            <div className="space-y-3">
                                                <input required value={form.title} onChange={e=>setForm({...form, title:e.target.value})} className="w-full bg-white border border-zinc-200 rounded-xl px-5 py-3 outline-none text-xs shadow-sm" placeholder="作品标题名称" />
                                                <div className="flex gap-2">
                                                    <select value={form.type} onChange={e=>setForm({...form, type:e.target.value})} className="flex-1 bg-white border border-zinc-200 rounded-xl px-4 py-3 outline-none text-xs shadow-sm cursor-pointer">
                                                        {categories.map(c => <option key={c.id} value={c.label}>{c.label}</option>)}
                                                    </select>
                                                    <input type="number" value={form.year} onChange={e=>setForm({...form, year:e.target.value})} className="w-20 bg-white border border-zinc-200 rounded-xl px-2 outline-none text-xs text-center shadow-sm" />
                                                    <input type="number" value={form.month} onChange={e=>setForm({...form, month:e.target.value})} className="w-12 bg-white border border-zinc-200 rounded-xl px-2 outline-none text-xs text-center shadow-sm" />
                                                </div>
                                                <input value={form.videoUrl || ''} onChange={e=>setForm({...form, videoUrl:e.target.value})} className="w-full bg-white border border-zinc-200 rounded-big px-5 py-3.5 outline-none text-xs shadow-sm font-mono" placeholder="动态视频链接 (腾讯云直连 MP4 / B站iframe)" />
                                                <textarea value={form.description} onChange={e=>setForm({...form, description:e.target.value})} className="w-full bg-white border border-zinc-200 rounded-big px-6 py-4 outline-none text-xs h-24 shadow-sm" placeholder="作品简述..." />
                                            </div>
                                            <div className="space-y-4">
                                                
                                                <div className="relative">
                                                    <div className="absolute top-4 left-5 text-zinc-300 pointer-events-none"><Icon name="link" size={16}/></div>
                                                    <textarea 
                                                        value={form.imageUrlsText || ''} 
                                                        onChange={e=>setForm({...form, imageUrlsText:e.target.value})} 
                                                        className="w-full bg-white border border-zinc-200 rounded-big pl-12 pr-6 py-4 outline-none text-xs h-40 shadow-sm font-mono leading-loose placeholder:leading-relaxed whitespace-pre" 
                                                        placeholder={"在此粘贴腾讯云 COS 图片链接 (多张图片请换行分隔)...\n\n例如:\nhttps://my-bucket.cos.../img1.jpg\nhttps://my-bucket.cos.../img2.jpg"}
                                                    />
                                                </div>

                                                <button disabled={isSyncing} type="submit" className="w-full py-4 bg-zinc-950 text-white rounded-xl font-black shadow-lg text-xs uppercase tracking-widest active:scale-95 transition-all">
                                                    {isSyncing ? "正在安全写入仓..." : editingId ? "保存并修改数据" : "确认发布空间"}
                                                </button>
                                                {editingId && (
                                                    <button type="button" onClick={handleCancelEdit} className="w-full py-2 border border-zinc-200 text-zinc-400 font-bold rounded-xl text-[10px]">取消编辑</button>
                                                )}
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="mb-12 md:mb-24 text-left animate-in fade-in duration-1000">
                            {config?.header?.headerImage && (
                                <div className="w-full mb-8 md:mb-16 rounded-big overflow-hidden shadow-2xl max-h-[300px] md:max-h-[600px] border border-zinc-50">
                                    <img src={config.header.headerImage} className="w-full h-full object-cover" />
                                </div>
                            )}
                            <h1 className="text-4xl sm:text-6xl md:text-8xl lg:text-[10rem] font-black tracking-tighter leading-[0.9] md:leading-[0.82] mb-8 md:mb-16 text-zinc-900 text-left">
                                {config?.header?.subtitle || 'MY WORK'}<br/><span className="text-zinc-100">{config?.header?.title || 'PORTFOLIO'}</span>
                            </h1>

                            <div className="space-y-4 pt-6 pb-2 border-t border-zinc-100 max-w-3xl">
                                <div className="flex items-center">
                                    <span className="hidden md:flex text-[10px] font-black text-zinc-400 uppercase tracking-widest mr-4 items-center gap-1"><Icon name="tag" size={12}/> 分类：</span>
                                    <div className="flex overflow-x-auto py-2 no-scrollbar gap-2 -mx-4 px-4 md:mx-0 md:px-0 md:flex-wrap w-screen md:w-auto">
                                        {categories.map(c => (
                                            <button key={c.id} onClick={() => setActiveCategory(c.label)} className={`px-5 md:px-8 py-2 md:py-3 rounded-full border text-[10px] md:text-[11px] font-black uppercase transition-all shrink-0 ${activeCategory === c.label ? 'bg-zinc-900 text-white border-zinc-900 shadow-2xl scale-105' : 'bg-transparent border-zinc-100 text-zinc-400 hover:border-zinc-300'}`}>{c.label}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex items-center pt-2 border-t border-dashed border-zinc-100">
                                    <span className="hidden md:flex text-[10px] font-black text-zinc-400 uppercase tracking-widest mr-4 items-center gap-1"><Icon name="calendar" size={12}/> 年份：</span>
                                    <div className="flex overflow-x-auto py-2 no-scrollbar gap-2 -mx-4 px-4 md:mx-0 md:px-0 md:flex-wrap w-screen md:w-auto">
                                        {availableYears.map(year => (
                                            <button key={year} onClick={() => setActiveYear(year)} className={`px-5 md:px-8 py-2 md:py-3 rounded-full border text-[10px] md:text-[11px] font-black uppercase transition-all shrink-0 ${String(activeYear) === String(year) ? 'bg-zinc-900 text-white border-zinc-900 shadow-2xl scale-105' : 'bg-transparent border-zinc-100 text-zinc-400 hover:border-zinc-300'}`}>{year === '全部' ? '全部年份' : `${year} 年`}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="gallery-columns space-y-4 md:space-y-8 text-left">
                            {!isLoaded && <div className="col-span-full py-24 text-center font-bold text-zinc-300 animate-pulse tracking-widest uppercase">正在全速拉取极速画廊中...</div>}
                            {isLoaded && displayProjects.map((project) => {
                                const currentIdx = previewIndices[project.id] || 0;
                                const images = (project.imgs && Array.isArray(project.imgs) && project.imgs.length > 0) ? project.imgs : [project.coverImage];
                                const displayImg = images[currentIdx];
                                const radius = config?.borderRadius ?? 16; 
                                const adjustedRadius = window.innerWidth < 640 ? Math.min(radius, 8) : radius;

                                return (
                                    <div key={project.id} style={{ borderRadius: `${adjustedRadius}px` }} className={`break-inside-avoid group relative bg-white border border-zinc-100 overflow-hidden transition-all duration-500 hover:shadow-2xl shadow-sm flex flex-col text-left mb-2 md:mb-8 ${project.isHidden ? 'opacity-40 grayscale ring-2 ring-zinc-100 ring-offset-2' : 'opacity-100'}`}>
                                        {accessToken && showAdminUI && (
                                            <div className="absolute top-3 md:top-8 right-3 md:right-8 flex gap-1.5 md:gap-3 z-[99] opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all transform translate-y-0 md:translate-y-2 md:group-hover:translate-y-0">
                                                <button title="置顶" onClick={() => setAsTop(project.id)} className="p-2 md:p-4 bg-white text-zinc-900 rounded-[0.8rem] md:rounded-[1.2rem] shadow-2xl hover:scale-110 flex items-center justify-center border border-zinc-100"><Icon name="arrow-up-circle" size={12}/></button>
                                                <button title="编辑作品" onClick={() => handleStartEdit(project)} className="p-2 md:p-4 bg-white text-zinc-900 rounded-[0.8rem] md:rounded-[1.2rem] shadow-2xl hover:scale-110 flex items-center justify-center border border-zinc-100"><Icon name="edit-3" size={12}/></button>
                                                <button title={project.isHidden ? "显示" : "隐藏"} onClick={() => toggleVisibility(project.id, project.isHidden)} className={`p-2 md:p-4 rounded-[0.8rem] md:rounded-[1.2rem] shadow-2xl hover:scale-110 flex items-center justify-center border border-zinc-100 ${project.isHidden ? 'bg-zinc-900 text-white border-zinc-900' : 'bg-white text-zinc-900'}`}><Icon name={project.isHidden ? "eye-off" : "eye"} size={12}/></button>
                                                <button title="永久删除" onClick={() => handleDeleteProject(project.id)} className="p-2 md:p-4 bg-red-600 text-white rounded-[0.8rem] md:rounded-[1.2rem] shadow-2xl hover:scale-110 flex items-center justify-center"><Icon name="trash-2" size={12}/></button>
                                            </div>
                                        )}

                                        <div style={{ borderTopLeftRadius: `${adjustedRadius}px`, borderTopRightRadius: `${adjustedRadius}px` }} className="relative w-full max-h-[300px] md:max-h-[600px] overflow-y-auto no-scrollbar bg-zinc-50">
                                            <MediaRenderer videoUrl={project.videoUrl} coverImg={displayImg} watermarkText={config?.watermark} alt={project.title} className="w-full h-auto block select-none" />
                                        </div>

                                        <div className="p-2 md:p-10 text-left flex-1 flex flex-col justify-between">
                                            <div>
                                                <div className="flex items-start justify-between gap-1 mb-1 md:mb-4">
                                                    <h3 className="text-xs md:text-2xl font-black leading-snug line-clamp-1" style={{ color: config?.titleColor || '#18181b' }}>{project.title}</h3>
                                                    <span className="text-zinc-300 text-[8px] md:text-[10px] font-black shrink-0">{project.year}.{project.month}</span>
                                                </div>
                                                <p className="text-[9px] md:text-xs font-medium leading-relaxed line-clamp-2 text-left" style={{ color: config?.textColor || '#71717a' }}>{project.description}</p>
                                            </div>

                                            {images.length > 1 && (
                                                <div className="flex gap-1.5 overflow-x-auto pt-3 md:pt-6 no-scrollbar">
                                                    {images.map((img, idx) => (
                                                        <div key={idx} onClick={()=>setPreviewIndices({...previewIndices, [project.id]: idx})} className={`w-6 h-6 md:w-12 md:h-12 rounded-md md:rounded-xl border flex-shrink-0 cursor-pointer transition-all duration-500 ${currentIdx === idx ? 'border-zinc-900 scale-105 shadow-md' : 'border-zinc-50 opacity-40 hover:opacity-100'}`}><img src={img} className="w-full h-full object-cover rounded-md md:rounded-xl" /></div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <footer className="py-24 px-10 border-t border-zinc-50 bg-white text-zinc-300 text-[8px] md:text-[10px] font-black tracking-[0.4em] uppercase text-center">
                        <div>&copy; 2026 PORTFOLIO.LIVE — GITHUB DATABASE ACTIVE</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
